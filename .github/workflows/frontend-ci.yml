name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "expensy_frontend/**"
  pull_request:
    branches: [main]
    paths:
      - "expensy_frontend/**"

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/expensy-frontend

jobs:
  ci:
    name: Build · Scan · Push · Sign
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit gitops manifest update
      id-token: write   # needed for Cosign keyless (not used here, but good practice)

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed by SonarCloud

      # ── 2. SonarCloud scan ────────────────────────────────────────────────
      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v3
        with:
          projectBaseDir: expensy_frontend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # Replace these two values with your actual SonarCloud org/project:
          SONAR_ORGANIZATION: YOUR_SONARCLOUD_ORG_KEY
          SONAR_PROJECT_KEY: YOUR_SONARCLOUD_PROJECT_KEY_FRONTEND

      # ── 3. Snyk dependency scan ───────────────────────────────────────────
      - name: Snyk – Scan dependencies
        uses: snyk/actions/node@master
        with:
          args: --file=expensy_frontend/package.json --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # ── 4. Setup Node & install + build ───────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: expensy_frontend/package-lock.json

      - name: Install dependencies
        working-directory: expensy_frontend
        run: npm ci

      - name: Build (Next.js)
        working-directory: expensy_frontend
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      # ── 5. Docker build ───────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: expensy_frontend
          file: expensy_frontend/Dockerfile
          platforms: linux/amd64
          push: false   # push happens after Trivy scan
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          load: true    # load into local daemon for Trivy

      # ── 6. Trivy image scan ───────────────────────────────────────────────
      - name: Trivy – Scan image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      # ── 7. Login to Docker Hub & push image ───────────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        id: docker_push
        uses: docker/build-push-action@v6
        with:
          context: expensy_frontend
          file: expensy_frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}

      # ── 8. Install Cosign & sign image ────────────────────────────────────
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign (key-based)
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          IMAGE_DIGEST: ${{ steps.docker_push.outputs.digest }}
        run: |
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY \
            "${{ env.IMAGE_NAME }}@${IMAGE_DIGEST}"

      # ── 9. Update GitOps manifest ─────────────────────────────────────────
      - name: Update image tag in GitOps manifest
        env:
          GIT_SHA: ${{ github.sha }}
          MANIFEST: gitops/expensy/frontend/frontend-deployment.yaml # для бэка смени на backend-deployment.yaml
        run: |
          if [ ! -f "$MANIFEST" ]; then
            echo "::warning::$MANIFEST not found — skipping GitOps update."
            exit 0
          fi

          # Обновляем тег образа в манифесте
          sed -i "s|image: ${{ env.IMAGE_NAME }}:.*|image: ${{ env.IMAGE_NAME }}:${GIT_SHA}|g" "$MANIFEST"

          # Настраиваем системного бота Git
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add "$MANIFEST"
          
          # Если изменений нет (например, повторный запуск джобы), выходим без ошибки
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          
          git commit -m "chore(gitops): update frontend image to ${GIT_SHA}"
          
          # Защита от Race Condition: делаем pull с ребейзом перед пушем.
          # Если в это время засинкался бэкенд, мы просто аккуратно встанем поверх его коммита.
          git pull --rebase origin main
          
          # Пушим изменения обратно в репозиторий
          git push origin main