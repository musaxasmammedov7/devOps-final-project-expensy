name: Terraform Azure Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  TERRAFORM_VERSION: 1.5.0

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # Job 1: Validation and Planning
  # ────────────────────────────────────────────────────────────────────────
  validate-and-plan:
    name: Validate · Plan
    runs-on: ubuntu-latest
    
    outputs:
      plan_output: ${{ steps.plan.outputs.stdout }}
      plan_exit_code: ${{ steps.plan.outcome }}

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup Terraform ─────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      # ── 3. Terraform Format Check ──────────────────────────────────────
      - name: Terraform Format Check
        run: |
          cd terraform
          terraform fmt -check -recursive
        continue-on-error: true

      # ── 4. Terraform Init ──────────────────────────────────────────────
      - name: Terraform Init
        run: |
          cd terraform
          terraform init -input=false -upgrade
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

      # ── 5. Terraform Validate ─────────────────────────────────────────
      - name: Terraform Validate
        run: |
          cd terraform
          terraform validate

      # ── 6. Terraform Plan ──────────────────────────────────────────────
      - name: Terraform Plan
        id: plan
        run: |
          cd terraform
          terraform plan -no-color -input=false -out=tfplan
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          TF_VAR_azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}

      # ── 7. Upload plan artifact ────────────────────────────────────────
      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v3
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 1

      # ── 8. Post plan to PR comment ─────────────────────────────────────
      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            
            // Read plan output
            let planOutput = '';
            try {
              const plan = require('child_process').execSync(
                'cd terraform && terraform show -no-color tfplan',
                { encoding: 'utf-8' }
              );
              planOutput = plan;
            } catch (e) {
              planOutput = 'Could not generate plan output';
            }

            const comment = `## 📋 Terraform Plan

            \`\`\`
            ${planOutput.substring(0, 10000)}
            \`\`\`

            ✅ Validation: PASSED
            📊 Plan Status: Ready for review`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # ────────────────────────────────────────────────────────────────────────
  # Job 2: Security Scanning (TfSec)
  # ────────────────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan (TfSec)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run TfSec Scan
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: terraform
          minimum_severity: WARNING

  # ────────────────────────────────────────────────────────────────────────
  # Job 3: Apply (only on push to main)
  # ────────────────────────────────────────────────────────────────────────
  apply:
    name: Apply
    needs: [validate-and-plan, security-scan]
    runs-on: ubuntu-latest
    
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    environment:
      name: production
      url: https://portal.azure.com

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup Terraform ─────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      # ── 3. Download plan artifact ──────────────────────────────────────
      - name: Download Terraform Plan
        uses: actions/download-artifact@v3
        with:
          name: tfplan
          path: terraform

      # ── 4. Terraform Init ──────────────────────────────────────────────
      - name: Terraform Init
        run: |
          cd terraform
          terraform init -input=false
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

      # ── 5. Terraform Apply ─────────────────────────────────────────────
      - name: Terraform Apply
        id: apply
        run: |
          cd terraform
          terraform apply -no-color -input=false tfplan
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

      # ── 6. Get outputs ─────────────────────────────────────────────────
      - name: Get Terraform Outputs
        id: outputs
        run: |
          cd terraform
          echo "key_vault_name=$(terraform output -raw key_vault_name)" >> $GITHUB_OUTPUT
          echo "key_vault_url=$(terraform output -raw key_vault_url)" >> $GITHUB_OUTPUT
          echo "client_id=$(terraform output -raw service_principal_client_id)" >> $GITHUB_OUTPUT
          echo "tenant_id=$(terraform output -raw tenant_id)" >> $GITHUB_OUTPUT

      # ── 7. Generate Kubernetes manifests ────────────────────────────────
      - name: Generate K8s Manifests
        run: |
          mkdir -p gitops/external-secrets

          # Get secret from Terraform output
          CLIENT_SECRET=$(cd terraform && terraform output -raw service_principal_client_secret)
          
          cat > gitops/external-secrets/azure-sp-secret.yaml <<EOF
          # yaml-language-server: \$schema=https://www.schemastore.org/any.json
          #
          # ВАЖНО: это единственный секрет в проекте, который НЕ синхронизируется через ESO
          # (credentials для самого ESO, чтобы достучаться до Azure Key Vault).
          # Этот файл ДОБАВЛЕН В .gitignore и должен применяться вручную через kubectl apply -f.
          #
          # ⚙️  АВТОМАТИЧЕСКИ СГЕНЕРИРОВАН CI/CD ПАЙПЛАЙНОМ
          # 🕐 Генерирован: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          #
          apiVersion: v1
          kind: Secret
          metadata:
            name: azure-sp-credentials
            namespace: external-secrets
          type: Opaque
          stringData:
            client-id: "${{ steps.outputs.outputs.client_id }}"
            client-secret: "$CLIENT_SECRET"
            tenant-id: "${{ steps.outputs.outputs.tenant_id }}"
          EOF

          cat > gitops/external-secrets/cluster-secret-store.yaml <<EOF
          # yaml-language-server: \$schema=https://www.schemastore.org/any.json
          #
          # Кластерный ресурс ClusterSecretStore, связывающий ESO с Azure Key Vault.
          # Позволяет всем namespace'ам запрашивать секреты, ссылаясь на этот стор.
          #
          # ⚙️  АВТОМАТИЧЕСКИ СГЕНЕРИРОВАН CI/CD ПАЙПЛАЙНОМ
          # 🕐 Генерирован: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          #
          apiVersion: external-secrets.io/v1beta1
          kind: ClusterSecretStore
          metadata:
            name: azure-keyvault-backend
          spec:
            provider:
              azurekv:
                authType: ServicePrincipal
                vaultUrl: "${{ steps.outputs.outputs.key_vault_url }}"
                tenantId: "${{ steps.outputs.outputs.tenant_id }}"
                authSecretRef:
                  clientId:
                    name: azure-sp-credentials
                    key: client-id
                    namespace: external-secrets
                  clientSecret:
                    name: azure-sp-credentials
                    key: client-secret
                    namespace: external-secrets
          EOF

      # ── 8. Commit and push manifests ───────────────────────────────────
      - name: Commit and Push Manifests
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Check if there are changes
          if git diff --quiet gitops/external-secrets/; then
            echo "No changes in manifests"
          else
            git add gitops/external-secrets/cluster-secret-store.yaml
            git commit -m "🤖 Update K8s manifests from Terraform outputs [skip ci]"
            git push
          fi
        continue-on-error: true

      # ── 9. Create GitHub deployment ────────────────────────────────────
      - name: Create GitHub Deployment
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'azure-infrastructure',
              description: 'Azure Infrastructure Deployment',
              auto_merge: false,
              required_contexts: []
            });

      # ── 10. Slack notification ────────────────────────────────────────
      - name: Notify Slack
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            Terraform Apply: ${{ job.status }}
            Key Vault: ${{ steps.outputs.outputs.key_vault_name }}
            Author: ${{ github.actor }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

  # ────────────────────────────────────────────────────────────────────────
  # Job 4: Sync manifests to ArgoCD (optional)
  # ────────────────────────────────────────────────────────────────────────
  sync-argocd:
    name: Sync to ArgoCD
    needs: apply
    runs-on: ubuntu-latest
    
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger ArgoCD Sync
        run: |
          # Это будет работать только если ArgoCD доступен извне
          # Замени на свой ArgoCD URL и токен
          echo "🔄 ArgoCD sync может быть добавлен здесь"
          echo "Используй ArgoCD API для синхронизации: https://argo-cd.readthedocs.io/en/stable/user-guide/commands/argocd_app_sync/"
        continue-on-error: true
