# yaml-language-server: $schema=https://www.schemastore.org/any.json
#
# ExternalSecret для получения пароля для Redis из Azure Key Vault.
# Будет автоматически создан Kubernetes Secret 'redis-password-secret'
# с ключом 'redis-password'.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: redis-password
  namespace: expensy
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault-backend
    kind: ClusterSecretStore
  target:
    name: redis-password-secret
    creationPolicy: Owner
  data:
    - secretKey: redis-password
      remoteRef:
        key: redis-password
