apiVersion: v1
kind: ServiceAccount
metadata:
  name: expensy-frontend-sa
  namespace: expensy
# Frontend не вызывает Kubernetes API программно — отключаем монтирование токена, чтобы при компрометации контейнера атакующий не получил доступ к Kubernetes API через токен default ServiceAccount.
automountServiceAccountToken: false
