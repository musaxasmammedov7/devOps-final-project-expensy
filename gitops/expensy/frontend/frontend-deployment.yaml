apiVersion: apps/v1
kind: Deployment
metadata:
  name: expensy-frontend
  namespace: expensy
  labels:
    app: expensy-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: expensy-frontend
  template:
    metadata:
      labels:
        app: expensy-frontend
    spec:
      serviceAccountName: expensy-frontend-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - expensy-frontend
                topologyKey: kubernetes.io/hostname
      containers:
        - name: frontend
          image: docker.io/mmusa7/expensy-frontend:4a32fbb73725673e8f03ac99e52bfa5942696345
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: expensy-frontend-config
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
            - name: next-cache-volume
              mountPath: /app/.next/cache
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: tmp-volume
          emptyDir: {}
        # Next.js в production режиме (next start) пишет runtime кэш в .next/cache — с readOnlyRootFilesystem: true нужен этот дополнительный volume, иначе приложение упадёт при попытке записи кэша.
        - name: next-cache-volume
          emptyDir: {}
