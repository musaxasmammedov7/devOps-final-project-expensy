# Root "App of Apps" — Argo CD applies this once,
# then it discovers and manages all child Applications
# under gitops/apps/ automatically.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/musaxasmammedov7/devOps-final-project-expensy.git
    targetRevision: main
    path: gitops/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
