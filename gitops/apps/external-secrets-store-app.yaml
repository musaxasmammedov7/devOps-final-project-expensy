# yaml-language-server: $schema=https://www.schemastore.org/any.json
#
# Argo CD Application для применения ClusterSecretStore.
# Отделен от основного приложения ESO для обеспечения того, что CRD ESO
# уже установлены и готовы (благодаря sync-wave).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-store
  namespace: argocd
  annotations:
    # sync-wave: "1" — применяется во второй волне, когда контроллер ESO готов
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/musaxasmammedov7/devOps-final-project-expensy.git
    targetRevision: main
    path: gitops/external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
